spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:better_cloud_drive}
    username: ${DB_USER:bcd_user}
    password: ${DB_PASSWORD:bcd_pass_2026}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    com.betterclouddrive: WARN
    root: WARN
  file:
    path: ${LOG_DIR:/var/log/cloud-drive}
  structured:
    json:
      context:
        include: true
      add:
        env: prod

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
