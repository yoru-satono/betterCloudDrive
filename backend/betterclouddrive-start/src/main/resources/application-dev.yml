spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:better_cloud_drive}
    username: ${DB_USER:bcd_user}
    password: ${DB_PASSWORD:bcd_pass_2026}

# Disable rate limiting in dev/test
drive:
  rate-limit:
    default-permits: 10000
    default-period-seconds: 1
    upload-permits: 10000
    upload-period-seconds: 1

logging:
  level:
    com.betterclouddrive: DEBUG
    org.springframework.security: DEBUG
    org.springframework.jdbc: DEBUG
