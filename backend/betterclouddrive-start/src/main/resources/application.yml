server:
  port: 8080

spring:
  application:
    name: better-cloud-drive

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # PostgreSQL DataSource
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:better_cloud_drive}
    username: ${DB_USER:bcd_user}
    password: ${DB_PASSWORD:bcd_pass_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # Redis (Lettuce)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Mailpit (email simulation)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

  # Multipart upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  sql:
    init:
      mode: never

# MyBatis-Plus
mybatis-plus:
  type-aliases-package: com.betterclouddrive.dal.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Storage (SeaweedFS S3)
storage:
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:8333}
    access-key: ${STORAGE_S3_ACCESS_KEY:any}
    secret-key: ${STORAGE_S3_SECRET_KEY:any}
    bucket: cloud-drive
    region: us-east-1
    path-style-access: true

# JWT
jwt:
  access-token:
    secret: ${JWT_ACCESS_SECRET:}
    expiration-ms: 1800000     # 30 minutes
  refresh-token:
    secret: ${JWT_REFRESH_SECRET:}
    expiration-ms: 2592000000  # 30 days

# Application settings
drive:
  recycle-bin:
    retention-days: 30
    cleanup-cron: "0 0 3 * * ?"   # 3:00 AM daily
  upload:
    chunk-size: 5242880           # 5MB
    session-expire-hours: 24
  version:
    max-versions: 10
  share:
    visit-sync-interval-ms: 300000  # 5 minutes
  storage:
    default-quota-bytes: 10737418240  # 10GB default quota for new users
    quota-sync-interval-ms: 60000     # 1 minute
  rate-limit:
    default-permits: 100
    default-period-seconds: 60
    upload-permits: 10
    upload-period-seconds: 60
