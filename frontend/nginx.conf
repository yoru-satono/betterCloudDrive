server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass ${FRONTEND_BACKEND_PROXY_BASE}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /webdav/ {
        proxy_pass ${FRONTEND_BACKEND_PROXY_BASE}/webdav/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /grafana-auth {
        internal;
        proxy_pass ${FRONTEND_BACKEND_PROXY_BASE}/api/v1/grafana/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location ^~ /grafana/ {
        auth_request /grafana-auth;
        auth_request_set $grafana_user $upstream_http_x_webauth_user;
        auth_request_set $grafana_name $upstream_http_x_webauth_name;
        auth_request_set $grafana_email $upstream_http_x_webauth_email;
        auth_request_set $grafana_role $upstream_http_x_webauth_role;

        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /grafana;
        proxy_set_header X-WEBAUTH-USER $grafana_user;
        proxy_set_header X-WEBAUTH-NAME $grafana_name;
        proxy_set_header X-WEBAUTH-EMAIL $grafana_email;
        proxy_set_header X-WEBAUTH-ROLE $grafana_role;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
