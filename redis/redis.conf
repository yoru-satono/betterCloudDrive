# Redis configuration for Better Cloud Drive

# Persistence
save 900 1
save 300 10
save 60 10000

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /data/redis.log

# Network
bind 0.0.0.0
protected-mode no

# Slow query log
slowlog-log-slower-than 10000
slowlog-max-len 128
